<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHAMS – Notification</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Roboto, Arial, sans-serif;
}

body{
    background:#1f1f1f;
    overflow:hidden;
    width:100%;
    height:100vh;
}


.topbar{
    height:8vh;
    background:#0b4a7a;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 2%;
}

.top-left{
    display:flex;
    align-items:center;
    gap:1.2vw;
    color:#fff;
}

.menu-icon{
    font-size:2vw;
    cursor:pointer;
}

.logo img{
    height:4.5vh;
}

.search-box input{
    width:15vw;
    height:4vh;
    border-radius:0.3vw;
    border:none;
    padding:0 1vw;
    outline:none;
    font-size:0.8vw;
}


.container{
    display:flex;
    height:92vh;
    width:100%;
}


.sidebar{
    width:18%;
    background:#ffffff;
    padding:2.5vh 1.2%;
    display:flex;
    flex-direction:column;
    transition:width 0.3s ease;
    border-right:0.1vw solid #ddd;
}

.sidebar.collapsed{
    width:6vw;
}

.sidebar.collapsed .hide-on-collapse,
.sidebar.collapsed .profile-role,
.sidebar.collapsed .real-name{
    display:none !important;
}

.sidebar.collapsed .profile-label{
    display:block !important;
    font-size:0.65vw;
    font-weight:800;
    color:#0b4a7a;
}

.sidebar.collapsed .menu-item{
    flex-direction:column;
    justify-content:center;
}

.sidebar.collapsed .menu-text{
    font-size:0.6vw !important;
}


.profile-card{
    text-align:center;
    margin-bottom:3vh;
}

.avatar-circle{
    width:5.5vw;
    height:5.5vw;
    border-radius:50%;
    background:#0b4a7a;
    margin:0 auto 1.5vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:3vw;
}

.profile-name{font-weight:600;font-size:1.1vw;}
.profile-label{display:none;}
.profile-role{font-size:0.8vw;color:#0b4a7a;margin-top:0.5vh;}

/* MENU */

.menu{flex:1;}

.menu-item{
    display:flex;
    align-items:center;
    gap:0.8vw;
    padding:1.2vh 5%;
    font-size:0.9vw;
    font-weight:600;
    color:#0b4a7a;
    border-radius:0.5vw;
    cursor:pointer;
}

.menu-item:hover{background:#f0f4f8;}

.menu-item i{font-size:1.5vw;}

.notification-dot{
    width:0.6vw;
    height:0.6vw;
    background:#ff2d8d;
    border-radius:50%;
    margin-left:auto;
}


.content{
    flex:1;
    background:#f5f6f8;
    padding:3vh 3%;
    overflow:auto;
}


.page-header{
    font-size:1.4vw;
    font-weight:600;
    color:#0b4a7a;
    margin-bottom:2vh;
    display:flex;
    align-items:center;
    gap:0.5vw;
}


.center-box{
    display:flex;
    justify-content:center;
    margin-top:6vh;
}

.notification-panel{
    background:#0b4a7a;
    width:30vw;
    padding:4vh;
    border-radius:0.7vw;
    text-align:center;
    box-shadow:0 0.8vw 2vw rgba(0,0,0,0.4);
}

.notification-panel i{
    font-size:2vw;
    margin-bottom:2vh;
}

.notif-item{
    background:#e6e6e6;
    padding:1.2vh;
    margin-bottom:1.5vh;
    border-radius:0.3vw;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

.clear-btn{
    margin-top:1vh;
    background:#fff;
    border:none;
    padding:0.8vh 1.8vw;
    border-radius:1vw;
    font-weight:600;
    color:#0b4a7a;
    cursor:pointer;
}
.signout{
    margin-top:2.5vh;
    display:flex;
    align-items:center;
    gap: 0.8vw;
    font-weight:700;
    font-size:0.9vw;
    color:#0b4a7a;
    cursor:pointer;
    padding:1vh 5%;
}


.stock-modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.4);
}

.stock-container{
    background:#ff7a00;
    width:30vw;
    padding:3vh 2vw;
    border-radius:0.7vw;
    text-align:center;
}

.stock-message{
    background:#e2caa1;
    padding:3vh;
    border-radius:1vw;
    margin-top:2vh;
}

.close-btn{
    margin-top:2vh;
    padding:1vh 2vw;
    border:none;
    background:#0b4a7a;
    color:#fff;
    border-radius:0.5vw;
    cursor:pointer;
}

</style>
</head>

<body>


<div class="topbar">
<div class="top-left">
<i class="fas fa-bars menu-icon" onclick="toggleMenu()"></i>
<div class="logo">
<img src="C:\Users\Admin\Downloads\CHAMS.JPG">
</div>
</div>

<div class="search-box">
<input type="text" placeholder="Search...">
</div>
</div>

<div class="container">


<div class="sidebar" id="sidebar">

<div class="profile-card">
<div class="avatar-circle">
<i class="fas fa-user"></i>
</div>

<div class="profile-name real-name">Jose L</div>
<div class="profile-label">PROFILE</div>
<div class="profile-role">ADMIN</div>
</div>

<div class="menu">
        <div class="menu-item"><i class="fas fa-home"></i> <span>HOME</span></div>
        <div class="menu-item"><i class="fas fa-ticket-alt"></i> <span>TICKETS</span></div>
        <div class="menu-item"><i class="fas fa-box"></i> <span>INVENTORY</span></div>
        <div class="menu-item hide-on-collapse"><i class="fas fa-search"></i> <span>INVENTORY TRACKER</span></div>
        <div class="menu-item"><i class="fas fa-clipboard-list"></i> <span>MAINTENANCE LOG</span></div>
        <div class="menu-item hide-on-collapse"><i class="fas fa-history"></i> <span>ACTIVITY LOG</span></div>
        <div class="menu-item">
            <i class="fas fa-bell"></i> <span>NOTIFICATION</span>
            <div class="notification-dot"></div>
        </div>
        <div class="menu-item"><i class="fas fa-cog"></i> <span>SETTINGS</span></div>
        <div class="menu-item hide-on-collapse"><i class="fas fa-question-circle"></i> <span>FAQs</span></div>
    </div>


    <div class="signout hide-on-collapse">
        <i class="fas fa-sign-out-alt"></i> <span>SIGN OUT</span>
    </div>
</div>


<div class="content">

<div class="page-header">
<i class="fas fa-chevron-left"></i> NOTIFICATION
</div>

<div class="center-box">

<div class="notification-panel">

<i class="fas fa-bell"></i>

<div class="notif-item" onclick="openStockAlert()">
Low Stock Alert!
<span>x</span>
</div>

<div class="notif-item">
Ticket Status Updated
<span>x</span>
</div>

<button class="clear-btn">CLEAR ALL</button>

</div>

</div>

</div>

</div>


<div class="stock-modal" id="stockModal">

<div class="stock-container">

<i class="fas fa-bell"></i>

<div class="stock-message">

<b>ALERT: STOCK IS BELOW ORDER THRESHOLD ON FOLLOWING ITEMS:</b>

<br><br>

Printer Ink (2 remaining)

<br><br>

Bond Paper (5 remaining)

</div>

<button class="close-btn" onclick="closeStock()">Close</button>

</div>

</div>

<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("collapsed");
}

function openStockAlert(){
document.getElementById("stockModal").style.display="flex";
}

function closeStock(){
document.getElementById("stockModal").style.display="none";
}

</script>

</body>
</html>
