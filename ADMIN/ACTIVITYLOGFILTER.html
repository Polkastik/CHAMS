<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Log Filters</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --hams-blue: #00407a;
            --text-main: #003366;
            --text-dark: #333;
            --text-light: #aaa;
            --border-color: #e0e0e0;
            --bg-hover: #f5f7fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Narrow', sans-serif; }

        body {
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
            height: 100vh;
        }

        /* --- FILTER PANEL CONTAINER --- */
        .filter-panel {
            background: white;
            width: 320px;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            position: relative;
        }

        /* Header */
        .filter-header {
            margin-bottom: 25px;
        }

        .filter-icon-top {
            color: var(--hams-blue);
            font-size: 18px;
            margin-bottom: 15px;
        }

        .filter-title {
            color: #222;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Input Fields */
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .custom-select {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px 15px;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
            position: relative;
        }

        .custom-select:hover {
            border-color: #bbb;
            background-color: #fafafa;
        }

        .custom-select.active {
            border-color: var(--hams-blue);
            box-shadow: 0 0 0 1px var(--hams-blue) inset;
        }

        .select-label {
            color: #aaa;
            font-size: 14px;
            font-weight: bold;
            margin-right: 10px;
        }

        .select-value {
            color: black;
            font-weight: bold;
            font-size: 14px;
            flex-grow: 1;
            text-align: left;
            padding-left: 5px;
        }

        .select-icon {
            color: #ccc;
            font-size: 12px;
            transition: transform 0.2s;
        }

        .custom-select.active .select-icon {
            transform: rotate(180deg);
            color: var(--hams-blue);
        }

        /* --- CALENDAR WIDGET --- */
        .calendar-wrapper {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            margin-top: 5px; 
            background: white;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: black;
            font-weight: bold;
            font-size: 14px;
        }

        .cal-nav {
            color: #ddd;
            cursor: pointer;
            font-size: 12px;
            padding: 5px;
        }
        .cal-nav:hover { color: var(--hams-blue); }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            row-gap: 10px;
        }

        .cal-date {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .cal-date:hover:not(.selected) {
            background-color: #f0f0f0;
        }

        .cal-date.muted {
            color: #ccc;
        }

        /* Blue Selection Circle */
        .cal-date.selected {
            background-color: var(--hams-blue);
            color: white;
        }

        /* Blue Text Highlight */
        .cal-date.highlight {
            color: var(--hams-blue);
        }

        /* Footer */
        .filter-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .clear-btn {
            color: black;
            font-weight: bold;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }
        .clear-btn:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <div class="filter-panel" id="activityFilterPanel">
        
        <div class="filter-icon-top">
            <i class="fas fa-filter"></i>
        </div>

        <div class="filter-header">
            <div class="filter-title">Activity Log Filters</div>
        </div>

        <div class="filter-group">
            
            <div class="custom-select" onclick="toggleSelect(this)">
                <span class="select-label">Name:</span>
                <span class="select-value" id="val-name">All</span>
                <i class="fas fa-chevron-down select-icon"></i>
            </div>

            <div class="custom-select" onclick="toggleSelect(this)">
                <span class="select-label">Role:</span>
                <span class="select-value" id="val-role">All</span>
                <i class="fas fa-chevron-down select-icon"></i>
            </div>

            <div class="custom-select" onclick="toggleSelect(this)">
                <span class="select-label">Activity Type :</span>
                <span class="select-value" id="val-type">All</span>
                <i class="fas fa-chevron-down select-icon"></i>
            </div>

            <div class="custom-select" onclick="toggleSelect(this)">
                <span class="select-label">Date Range:</span>
                <span class="select-value" id="val-date">3 Nov</span>
                <i class="fas fa-chevron-down select-icon"></i>
            </div>

            <div class="calendar-wrapper">
                <div class="cal-header">
                    <i class="fas fa-chevron-left cal-nav"></i>
                    <span>November 2025</span>
                    <i class="fas fa-chevron-right cal-nav"></i>
                </div>
                
                <div class="cal-grid" id="calendarGrid">
                    <div class="cal-date muted">28</div>
                    <div class="cal-date muted">29</div>
                    <div class="cal-date muted">30</div>
                    <div class="cal-date muted">31</div>
                    <div class="cal-date highlight" id="date-1" onclick="selectDate(this)">1</div>
                    <div class="cal-date highlight" id="date-2" onclick="selectDate(this)">2</div>
                    <div class="cal-date highlight" id="date-3" onclick="selectDate(this)">3</div>

                    <div class="cal-date" onclick="selectDate(this)">4</div>
                    <div class="cal-date selected" id="defaultSelected" onclick="selectDate(this)">5</div>
                    <div class="cal-date" onclick="selectDate(this)">6</div>
                    <div class="cal-date" onclick="selectDate(this)">7</div>
                    <div class="cal-date" onclick="selectDate(this)">8</div>
                    <div class="cal-date" onclick="selectDate(this)">9</div>
                    <div class="cal-date" onclick="selectDate(this)">10</div>

                    <div class="cal-date" onclick="selectDate(this)">11</div>
                    <div class="cal-date" onclick="selectDate(this)">12</div>
                    <div class="cal-date" onclick="selectDate(this)">13</div>
                    <div class="cal-date" onclick="selectDate(this)">14</div>
                    <div class="cal-date" onclick="selectDate(this)">15</div>
                    <div class="cal-date" onclick="selectDate(this)">16</div>
                    <div class="cal-date" onclick="selectDate(this)">17</div>

                    <div class="cal-date" onclick="selectDate(this)">18</div>
                    <div class="cal-date" onclick="selectDate(this)">19</div>
                    <div class="cal-date" onclick="selectDate(this)">20</div>
                    <div class="cal-date" onclick="selectDate(this)">21</div>
                    <div class="cal-date" onclick="selectDate(this)">22</div>
                    <div class="cal-date" onclick="selectDate(this)">23</div>
                    <div class="cal-date" onclick="selectDate(this)">24</div>

                    <div class="cal-date" onclick="selectDate(this)">25</div>
                    <div class="cal-date" onclick="selectDate(this)">26</div>
                    <div class="cal-date" onclick="selectDate(this)">27</div>
                    <div class="cal-date" onclick="selectDate(this)">28</div>
                    <div class="cal-date" onclick="selectDate(this)">29</div>
                    <div class="cal-date" onclick="selectDate(this)">30</div>
                    <div class="cal-date muted">1</div>

                    <div class="cal-date muted">2</div>
                    <div class="cal-date muted">3</div>
                    <div class="cal-date muted">4</div>
                    <div class="cal-date muted">5</div>
                    <div class="cal-date muted">6</div>
                    <div class="cal-date muted">7</div>
                    <div class="cal-date muted">8</div>
                </div>
            </div>

        </div>

        <div class="filter-footer">
            <div class="clear-btn" onclick="clearFilters()">Clear Filters</div>
        </div>

    </div>

    <script>
        function toggleSelect(element) {
            const allSelects = document.querySelectorAll('.custom-select');
            allSelects.forEach(el => {
                if (el !== element) el.classList.remove('active');
            });
            element.classList.toggle('active');
        }

        function selectDate(element) {
            if (element.classList.contains('muted')) return;

            const allDates = document.querySelectorAll('.cal-date');
            allDates.forEach(d => d.classList.remove('selected'));

            element.classList.add('selected');
        }

        function clearFilters() {
            document.getElementById('val-name').innerText = 'All';
            document.getElementById('val-role').innerText = 'All';
            document.getElementById('val-type').innerText = 'All';
            document.getElementById('val-date').innerText = '3 Nov';

            const allDates = document.querySelectorAll('.cal-date');
            allDates.forEach(d => {
                d.classList.remove('selected');
                d.classList.remove('highlight');
            });

            document.getElementById('date-1').classList.add('highlight');
            document.getElementById('date-2').classList.add('highlight');
            document.getElementById('date-3').classList.add('highlight');
            document.getElementById('defaultSelected').classList.add('selected');

            const allSelects = document.querySelectorAll('.custom-select');
            allSelects.forEach(el => el.classList.remove('active'));
        }
    </script>

</body>
</html>
