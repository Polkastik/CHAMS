<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMS - Inventory Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --hams-blue: #00407a;
            --sidebar-bg: #e9eff5;
            --text-main: #003366;
            --border-color: #bcccdc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Narrow', sans-serif; }
        
        body { 
            display: flex; 
            height: 100vh; 
            background-color: #f4f7f9; 
            overflow: hidden; 
            width: 100%; 
            font-size: 100%; 
        }

        /* --- HEADER --- */
        header {
            background-color: var(--hams-blue);
            height: 8vh; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2%;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 2vw; color: white; height: 100%; }
        .menu-toggle { font-size: 2.5vh; cursor: pointer; color: white; }
        .logo-img { height: 80%; width: auto; mix-blend-mode: screen; filter: brightness(1.1); }

        .search-container {
            background: white; border-radius: 0.5vw; display: flex; align-items: center;
            padding: 0.3% 1%; width: 20%; box-shadow: inset 0 0.1vh 0.3vh rgba(0,0,0,0.1);
        }
        .search-container input { border: none; outline: none; width: 100%; font-size: 80%; }
        .search-container i { color: #aaa; font-size: 80%; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 15vw; 
            background-color: var(--sidebar-bg);
            padding-top: 10vh; 
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            border-right: 0.1vw solid #d1d9e0;
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
        }

        .sidebar.collapsed { width: 6vw; }

        .profile-area { text-align: center; padding: 5% 5%; margin-bottom: 2vh; }
        .sidebar.collapsed .profile-area { display: none; }

        .profile-icon-big { font-size: 8vh; color: var(--text-main); margin-bottom: 2%; }
        .profile-name { font-weight: bold; color: var(--text-main); font-size: 1.5vh; margin-bottom: 1vh;}
        .staff-badge {
            background: white; border: 0.1vw solid #ccc; border-radius: 1vw;
            padding: 2% 10%; font-size: 1vh; font-weight: bold; color: var(--text-main);
        }

        .nav-list { flex-grow: 1; display: flex; flex-direction: column; }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 1.5vh 15%;
            text-decoration: none;
            color: var(--text-main);
            font-weight: bold;
            font-size: 1.3vh;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .sidebar.collapsed .nav-item {
            flex-direction: column;
            padding: 1.5vh 0;
            justify-content: center;
            text-align: center;
        }

        .nav-item i { font-size: 2.2vh; width: 2vw; margin-right: 5%; text-align: center; }
        .sidebar.collapsed .nav-item i { margin-right: 0; margin-bottom: 0.5vh; font-size: 2.5vh; }
        .sidebar.collapsed .nav-item span { font-size: 0.9vh; letter-spacing: 0; }

        .nav-item:hover { background: #dce4ed; }
        .dot { color: #ff007f; margin-left: 2%; font-size: 1.5vh; }

        /* --- CONTENT AREA --- */
        .main-wrapper { 
            margin-left: 15vw;
            width: 85vw;
            padding-top: 10vh;
            padding-left: 3%; 
            padding-right: 3%; 
            overflow-y: auto;
            transition: margin-left 0.3s ease, width 0.3s ease;
        }

        .sidebar.collapsed + .main-wrapper {
            margin-left: 6vw;
            width: 94vw;
        }

        .sign-out { margin-top: auto; border-top: 0.1vh solid #cbd5e0; padding-bottom: 2vh; }

        /* --- INVENTORY SPECIFICS --- */
        .page-header { display: flex; align-items: center; gap: 1vw; margin-bottom: 2vh; color: var(--text-main); }
        .page-header h2 { font-size: 2.2vh; text-transform: uppercase; letter-spacing: 0.1vw; }

        .inventory-toolbar {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 1vh 2%; border: 0.1vw solid var(--border-color);
            margin-bottom: 2vh; font-size: 1.2vh; color: #666;
        }

        .inventory-item {
            background: white;
            border: 0.1vw solid var(--border-color);
            padding: 2vh 2%;
            display: flex;
            align-items: center;
            position: relative;
        }

        .inv-check { width: 3%; }
        .inv-box-icon { width: 5%; font-size: 3.5vh; color: #333; text-align: center; }
        .inv-details { width: 75%; padding-left: 2vw; }
        
        .inv-title { font-weight: bold; font-size: 1.4vh; color: #333; margin-bottom: 0.5vh; }
        .inv-info-row { display: flex; font-size: 1.1vh; color: #666; margin-bottom: 0.3vh; }
        .inv-label { width: 5vw; }
        .inv-value { font-weight: bold; color: #333; }
        .inv-dot { color: #ff0000; margin-left: 1vw; font-size: 1.5vh; }

        .inv-meta { width: 17%; text-align: right; display: flex; flex-direction: row; justify-content: flex-end; align-items: center; gap: 1vw; }
        .inv-date { font-size: 1.1vh; color: #999; white-space: nowrap; }
        .inv-options { color: #ccc; cursor: pointer; font-size: 1.5vh; }
        .inv-lock { color: #333; font-size: 2vh; }

    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars menu-toggle" id="toggleBtn"></i>
            <img src="CHAMS LOGO.jpg" alt="CHAMS Logo" class="logo-img">
        </div>
        <div class="search-container">
            <input type="text" placeholder="Search Inventory...">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="profile-area">
            <div class="profile-icon-big"><i class="fas fa-user-circle"></i></div>
            <div class="profile-name">Kenneth F.</div>
            <div class="staff-badge">STAFF | 2.0.1 <i class="fas fa-cog"></i></div>
        </div>

        <div class="nav-list">
            <a href="#" class="nav-item profile-collapsed-only" style="display: none;" id="collapsedProfile">
                <i class="fas fa-user-circle"></i><span>Profile</span>
            </a>
            <a href="#" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="#" class="nav-item"><i class="fas fa-file-invoice"></i><span>Tickets</span></a>
            <a href="#" class="nav-item" style="background: #dce4ed;"><i class="fas fa-folder"></i><span>Inventory</span></a>
            <a href="#" class="nav-item"><i class="fas fa-bell"></i><span>Notification<span class="dot">●</span></span></a>
            <a href="#" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
            <a href="#" class="nav-item"><i class="fas fa-question-circle"></i><span>FAQs</span></a>
        </div>

        <a href="#" class="nav-item sign-out"><i class="fas fa-sign-out-alt"></i><span>Sign Out</span></a>
    </nav>

    <div class="main-wrapper">
        <div class="page-header">
            <i class="fas fa-chevron-left" style="color: var(--hams-blue);"></i>
            <h2>Inventory</h2>
        </div>

        <div class="inventory-toolbar">
            <div>Edit &nbsp;&nbsp;&nbsp;&nbsp; Sort by: <b>Date</b> <i class="fas fa-caret-down"></i></div>
            <div>1-1 of 1 &nbsp; <i class="fas fa-chevron-left"></i> &nbsp; <i class="fas fa-chevron-right"></i></div>
        </div>

        <div class="inventory-item">
            <div class="inv-check"><input type="checkbox"></div>
            <div class="inv-box-icon"><i class="fas fa-box"></i></div>
            <div class="inv-details">
                <div class="inv-title">Printer Ink</div>
                <div class="inv-info-row">
                    <span class="inv-label">Input by:</span>
                    <span class="inv-value">Sam M | Admin</span>
                    <span class="inv-dot">●</span>
                </div>
                <div class="inv-info-row">
                    <span class="inv-label">Supplier:</span>
                    <span class="inv-value">Red Horse Co.</span>
                </div>
                <div class="inv-info-row" style="margin-top: 1vh;">
                    <span class="inv-value">100-3094-999</span>
                </div>
            </div>
            <div class="inv-meta">
                <div class="inv-date">3 Nov 14:24</div>
                <div class="inv-options"><i class="fas fa-ellipsis-v"></i></div>
                <div class="inv-lock"><i class="fas fa-lock"></i></div>
            </div>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('toggleBtn');
        const sidebar = document.getElementById('sidebar');
        const collapsedProfile = document.getElementById('collapsedProfile');

        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                collapsedProfile.style.display = 'flex';
            } else {
                collapsedProfile.style.display = 'none';
            }
        });
    </script>
</body>
</html>
