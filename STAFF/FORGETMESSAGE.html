<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success Message</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --hams-blue: #00407a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Narrow', sans-serif; }

        body {
            background-color: var(--hams-blue);
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-wrapper {
            position: relative;
            width: 500px;
            /* Container for positioning the icon relative to the box */
        }

        .modal-card {
            background-color: white;
            border-radius: 10px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-text {
            color: #333;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.3;
        }

        .check-icon {
            position: absolute;
            top: 10px; /* Pulls the icon up outside the box */
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            color: black;
            /* The icon in the image is sharp and black */
        }
    </style>
</head>
<body>

    <div class="modal-wrapper">
        <i class="fas fa-check check-icon"></i>
        
        <div class="modal-card">
            <div class="success-text">
                Kindly Wait for the email in your work account then fill up your new password!
            </div>
        </div>
    </div>

</body>
</html>
