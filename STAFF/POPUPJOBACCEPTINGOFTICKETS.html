<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Ticket Modal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --hams-blue: #00407a;
            --text-dark: #222;
            --text-light: #666;
            --btn-accept: #4a7dff;
            --btn-decline: #eb6a6a;
            --modal-bg: #f4f4f4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Narrow', sans-serif; }

        body {
            background-color: #333; /* Dark background to highlight the modal */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- MODAL CONTAINER --- */
        .modal-card {
            background-color: var(--modal-bg);
            width: 420px;
            padding: 30px;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        /* Header / Title */
        .modal-title {
            font-size: 20px;
            font-weight: 900; /* Extra bold */
            color: black;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        /* Close X */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            color: #aaa;
            cursor: pointer;
            font-weight: bold;
        }
        .close-btn:hover { color: #555; }

        /* Description Text */
        .modal-desc {
            font-size: 13px;
            color: black;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        /* Divider Line */
        .divider {
            height: 1px;
            background-color: #ddd;
            width: 100%;
            margin-bottom: 20px;
        }

        /* Ticket Details */
        .ticket-detail {
            font-size: 13px;
            margin-bottom: 8px;
            color: black;
        }

        .ticket-detail strong {
            color: #aaa; /* Gray label */
            margin-right: 5px;
            text-transform: uppercase;
            font-size: 12px;
        }

        .ticket-detail span {
            font-weight: bold;
        }

        /* Buttons Container */
        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 25px; /* Pill shape */
            border: none;
            color: white;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-accept { background-color: var(--btn-accept); }
        .btn-decline { background-color: var(--btn-decline); }

    </style>
</head>
<body>

    <div class="modal-card" id="ticketModal">
        <span class="close-btn" onclick="closeModal()">x</span>
        
        <div class="modal-title">ACCEPT NEW TICKET ?</div>
        
        <div class="modal-desc">
            A new support ticket has assigned you. Do you want to accept this job
        </div>

        <div class="divider"></div>

        <div class="ticket-detail">
            <strong>TICKET ID:</strong> <span>MISD-202308-007</span>
        </div>

        <div class="ticket-detail">
            <strong>SUBJECT:</strong> <span>No internet.</span>
        </div>

        <div class="btn-container">
            <button class="btn btn-accept" onclick="acceptTicket()">ACCEPT</button>
            <button class="btn btn-decline" onclick="declineTicket()">DECLINE</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('ticketModal');

        function closeModal() {
            modal.style.display = 'none';
        }

        function acceptTicket() {
            // Simulate acceptance logic
            alert("Ticket MISD-202308-007 Accepted!");
            closeModal();
        }

        function declineTicket() {
            // Simulate decline logic
            alert("Ticket Declined.");
            closeModal();
        }
    </script>

</body>
</html>
