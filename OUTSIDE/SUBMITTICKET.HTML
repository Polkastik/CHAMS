<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAMS - Create Ticket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --hams-blue: #00407a;
            --sidebar-bg: #e9eff5;
            --text-main: #003366;
            --border-color: #bcccdc;
            /* Button Colors from Image */
            --btn-draft: #9fb04c; /* Olive green */
            --btn-close: #eb6a6a; /* Red/Salmon */
            --btn-submit: #00aee6; /* Cyan/Blue */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Narrow', sans-serif; }
        
        body { 
            display: flex; 
            height: 100vh; 
            background-color: #f4f7f9; 
            overflow: hidden; 
            width: 100%; 
            font-size: 100%; 
        }

        /* --- HEADER --- */
        header {
            background-color: var(--hams-blue);
            height: 8vh; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2%;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 2vw; color: white; height: 100%; }
        .menu-toggle { font-size: 2.5vh; cursor: pointer; color: white; }
        .logo-img { height: 80%; width: auto; mix-blend-mode: screen; filter: brightness(1.1); }

        .search-container {
            background: white; border-radius: 0.5vw; display: flex; align-items: center;
            padding: 0.3% 1%; width: 20%; box-shadow: inset 0 0.1vh 0.3vh rgba(0,0,0,0.1);
        }
        .search-container input { border: none; outline: none; width: 100%; font-size: 80%; }
        .search-container i { color: #aaa; font-size: 80%; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 15vw; 
            background-color: var(--sidebar-bg);
            padding-top: 10vh; 
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            border-right: 0.1vw solid #d1d9e0;
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
        }

        .sidebar.collapsed { width: 6vw; }

        .profile-area { text-align: center; padding: 5% 5%; margin-bottom: 2vh; }
        .sidebar.collapsed .profile-area { display: none; }

        .profile-icon-big { font-size: 8vh; color: var(--text-main); margin-bottom: 2%; }
        .profile-name { font-weight: bold; color: var(--text-main); font-size: 1.5vh; margin-bottom: 1vh;}
        .staff-badge {
            background: white; border: 0.1vw solid #ccc; border-radius: 1vw;
            padding: 2% 10%; font-size: 1vh; font-weight: bold; color: var(--text-main);
        }

        .nav-list { flex-grow: 1; display: flex; flex-direction: column; }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 1.5vh 15%;
            text-decoration: none;
            color: var(--text-main);
            font-weight: bold;
            font-size: 1.3vh;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .sidebar.collapsed .nav-item {
            flex-direction: column;
            padding: 1.5vh 0;
            justify-content: center;
            text-align: center;
        }

        .nav-item i { font-size: 2.2vh; width: 2vw; margin-right: 5%; text-align: center; }
        .sidebar.collapsed .nav-item i { margin-right: 0; margin-bottom: 0.5vh; font-size: 2.5vh; }
        .sidebar.collapsed .nav-item span { font-size: 0.9vh; letter-spacing: 0; }

        .nav-item:hover { background: #dce4ed; }
        .dot { color: #ff007f; margin-left: 2%; font-size: 1.5vh; }
        .sign-out { margin-top: auto; border-top: 0.1vh solid #cbd5e0; padding-bottom: 2vh; }

        /* --- CONTENT AREA --- */
        .main-wrapper { 
            margin-left: 15vw;
            width: 85vw;
            padding-top: 10vh;
            padding-left: 3%; 
            padding-right: 3%; 
            overflow-y: auto;
            transition: margin-left 0.3s ease, width 0.3s ease;
        }
        .sidebar.collapsed + .main-wrapper { margin-left: 6vw; width: 94vw; }

        /* --- CREATE TICKET FORM STYLES --- */
        .page-header {
            color: var(--text-main);
            font-size: 2.5vh;
            font-weight: bold;
            margin-bottom: 2vh;
            text-transform: uppercase;
            display: flex;
            align-items: center;
        }
        .page-header i { margin-right: 15px; cursor: pointer; }

        .form-card {
            background: white;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 4vh;
            min-height: 80vh;
            position: relative;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 2vh;
        }

        .form-label {
            width: 150px;
            font-weight: bold;
            font-size: 1.4vh;
            color: black;
        }

        .form-input-container {
            flex-grow: 1;
        }

        .form-input {
            width: 100%;
            padding: 1vh;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1.3vh;
            background: #fdfdfd;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
            font-weight: bold;
        }

        /* Specific input styling based on image */
        .input-short { width: 30%; }
        
        .msg-label {
            font-weight: bold;
            font-size: 1.4vh;
            color: black;
            margin-bottom: 1vh;
        }

        .msg-area {
            width: 100%;
            height: 25vh;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 1vh;
            resize: none;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        /* Action Buttons */
        .btn-row {
            display: flex;
            justify-content: space-between; /* Spreads them out broadly */
            margin-top: 8vh;
            padding: 0 5vw;
        }

        .btn-action {
            border: none;
            color: white;
            padding: 1.5vh 5vh;
            border-radius: 20px; /* Pill shape */
            font-weight: bold;
            font-size: 1.4vh;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .btn-action:active { transform: scale(0.98); }

        .btn-draft { background-color: var(--btn-draft); }
        .btn-close { background-color: var(--btn-close); }
        .btn-submit { background-color: var(--btn-submit); }

    </style>
</head>
<body>

<header>
    <div class="header-left">
        <i class="fas fa-bars menu-toggle" id="toggleBtn"></i>
        <img src="CHAMS LOGO.jpg" alt="CHAMS Logo" class="logo-img">
    </div>
    <div class="search-container">
        <input type="text" placeholder="Search...">
        <i class="fas fa-search"></i>
    </div>
</header>

<nav class="sidebar" id="sidebar">
    <div class="profile-area">
        <div class="profile-icon-big"><i class="fas fa-user-circle"></i></div>
        <div class="profile-name">Kenneth F.</div>
        <div class="staff-badge">STAFF | 2.0.1 <i class="fas fa-cog"></i></div>
    </div>

    <div class="nav-list">
        <a href="#" class="nav-item profile-collapsed-only" style="display: none;" id="collapsedProfile">
            <i class="fas fa-user-circle"></i><span>Profile</span>
        </a>

        <a href="#" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="#" class="nav-item"><i class="fas fa-file-invoice"></i><span>Tickets</span></a>
        <a href="#" class="nav-item"><i class="fas fa-folder"></i><span>Inventory</span></a>
        <a href="#" class="nav-item"><i class="fas fa-bell"></i><span>Notification<span class="dot">●</span></span></a>
        <a href="#" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        <a href="#" class="nav-item"><i class="fas fa-question-circle"></i><span>FAQs</span></a>
    </div>

    <a href="#" class="nav-item sign-out"><i class="fas fa-sign-out-alt"></i><span>Sign Out</span></a>
</nav>

<div class="main-wrapper">
    <div class="page-header">
        <i class="fas fa-chevron-left"></i> TICKETS
    </div>

    <div class="form-card">
        
        <div class="form-row">
            <div class="form-label">Applicant Name:</div>
            <div class="form-input-container">
                <input type="text" class="form-input" value="Jin Shembot">
            </div>
        </div>

        <div class="form-row">
            <div class="form-label">Department :</div>
            <div class="form-input-container">
                <select class="form-input input-short">
                    <option>Select Department</option>
                    <option>MISD</option>
                    <option>HR</option>
                    <option>Accounting</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-label">Ticket Type :</div>
            <div class="form-input-container">
                <select class="form-input input-short">
                    <option>Network & Connectivity</option>
                    <option>Hardware Issue</option>
                    <option>Software Issue</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-label">Subject :</div>
            <div class="form-input-container">
                <input type="text" class="form-input" value="Poor network connection">
            </div>
        </div>

        <div class="msg-label">Message</div>
        <textarea class="msg-area"></textarea>

        <div class="btn-row">
            <button class="btn-action btn-draft">SAVE DRAFT</button>
            <button class="btn-action btn-close">CLOSE TICKET</button>
            <button class="btn-action btn-submit">SUBMIT TICKET</button>
        </div>

    </div>
</div>

<script>
    const toggleBtn = document.getElementById('toggleBtn');
    const sidebar = document.getElementById('sidebar');
    const collapsedProfile = document.getElementById('collapsedProfile');

    toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        if (sidebar.classList.contains('collapsed')) {
            collapsedProfile.style.display = 'flex';
        } else {
            collapsedProfile.style.display = 'none';
        }
    });
</script>

</body>
</html>
